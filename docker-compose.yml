services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      SQLITE_DB_PATH: /var/lib/modern-db-admin/app.sqlite
      CORS_ORIGIN: https://${MODERN_DB_ADMIN_DOMAIN}
    expose:
      - "3001"
    volumes:
      - modern_db_admin_data:/var/lib/modern-db-admin
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    environment:
      MODERN_DB_ADMIN_DOMAIN: ${MODERN_DB_ADMIN_DOMAIN}
      MODERN_DB_ADMIN_ACME_EMAIL: ${MODERN_DB_ADMIN_ACME_EMAIL}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  modern_db_admin_data:
  caddy_data:
  caddy_config:
